<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="پخش زنده و ۲۴ ساعته موسیقی لوفای (Lofi) و آهنگ‌های بی‌کلام آرامش‌بخش، مناسب برای تمرکز، مطالعه، برنامه‌نویسی و استراحت.">
    <meta name="keywords" content="لوفای, موسیقی بی کلام, آرامش بخش, رادیو لوفای, مطالعه, تمرکز, پخش زنده, lofi, chill, radio">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="پخش لوفای ۲۴/۷">
    <meta property="og:description" content="پخش زنده و ۲۴ ساعته موسیقی لوفای (Lofi) و آهنگ‌های بی‌کلام آرامش‌بخش.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="fa_IR">
    <title>پخش لوفای ۲۴/۷</title>
    <link rel="icon" href="https://mir-s3-cdn-cf.behance.net/projects/404/854d80105964701.Y3JvcCw1NzgsNDUyLDU3MiwyODA.jpg" type="image/jpeg">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Dynamic Background -->
    <img id="bg-img" class="background hidden" alt="Lofi Background">

    <!-- Overlay (75% Opacity) -->
    <div id="overlay" class="overlay">
        <h1>Click To Play</h1>
    </div>

    <!-- Audio Player -->
    <audio id="audio-player"></audio>

    <!-- UI Controls -->
    <div class="ui-container hidden" id="ui-container">
        <!-- Top Icons Bar -->
        <div class="top-icons-bar">
            <div class="top-icons-left">
                <!-- Info -->
                <button class="icon" id="info-btn" type="button" title="Info / Contact" aria-label="Info / Contact">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"></path><path d="M12 8v4"></path><path d="M12 16h.01"></path></svg>
                </button>
                <!-- Toggle Background -->
                <button class="icon" id="bg-toggle-btn" type="button" title="Toggle Background" aria-label="Toggle Background">
                    <svg id="icon-eye-open" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    <svg id="icon-eye-closed" class="hidden" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline><line x1="2" y1="2" x2="22" y2="22"></line></svg>
                </button>
            </div>
            <div class="top-icons-right">
                <!-- Total Visits -->
                <div class="icon" id="visit-icon" title="Total Visits" aria-label="Total Visits">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    <span id="visit-count">0</span>
                </div>
                <!-- Online Users -->
                <div class="icon" id="online-users" title="Online Users" aria-label="Online Users">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    <span id="user-count">1</span>
                </div>
            </div>
        </div>

        <!-- Shortcuts Banner -->
        <div class="shortcuts-banner">
            <span><strong>M</strong> Mute / Unmute</span>
            <span><strong>D</strong> Distraction-Free</span>
        </div>

        <!-- Center: Clock -->
        <div class="clock" id="clock">00:00</div>

        <!-- Center Bottom: Song Name & Mute / Unmute -->
        <div class="center-container">
            <div class="song-marquee" title="Currently Playing">
                <span class="song-name" id="song-name">Loading...</span>
            </div>
            <button class="icon" id="mute-btn" type="button" title="Mute / Unmute" aria-label="Mute / Unmute" style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-radius: 14px; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);">
                <svg id="icon-mute" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                <svg id="icon-unmute" class="hidden" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </button>
        </div>

        <!-- Bottom Right: Volume -->
        <div class="icon bottom-right volume-control" title="Volume" aria-label="Volume">
            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
        </div>
    </div>

    <script src="/app.js?v=4"></script>
</body>
</html>
