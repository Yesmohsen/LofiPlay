services:
  lofiplay:
    image: ghcr.io/yesmohsen/lofiplay:latest
    container_name: lofiplay
    pull_policy: always
    restart: unless-stopped
    ports:
      - "6001:6001"
    volumes:
      - ${LOFIPLAY_HOST_DIR:-/root/lofiplay}/audio:/app/audio
      - ${LOFIPLAY_HOST_DIR:-/root/lofiplay}/backgrounds:/app/backgrounds
    networks:
      - lofiplay-net

  caddy:
    image: caddy:alpine
    container_name: lofiplay-caddy
    restart: unless-stopped
    depends_on:
      - lofiplay
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from lofiplay.ir --to lofiplay:6001
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - lofiplay-net

volumes:
  caddy_data:
  caddy_config:

networks:
  lofiplay-net:
